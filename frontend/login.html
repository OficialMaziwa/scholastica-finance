<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholastica Finance - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-landmark"></i>
                <h1>Scholastica Finance</h1>
                <p>Smart Loan Management System</p>
            </div>

            <div id="alert" class="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Username au Email</label>
                    <div class="input-group">
                        <input type="text" id="identifier" placeholder="email@.com" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Nywila</label>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="••••••" required
                            autocomplete="current-password">
                        <i class="fas fa-eye toggle-password"></i>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span>🔓 Ingia kwenye Mfumo</span>
                    <div class="loading-spinner" id="loadingSpinner"></div>
                </button>
            </form>

            <div class="footer">
                <i class="far fa-copyright"></i> 2026 Scholastica Finance - Smart Loan Solutions
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
